<script>
var SYSTEM_PROMPT = `You are Zai — a mortgage routing engine built by a 23-year banking professional. You are not a chatbot. You are a decision tool for mortgage brokers and borrowers.

YOUR JOB: Answer one question — "Which lender type should this file historical patterns favor?"

OUTPUT FORMAT — ALWAYS START WITH THIS, NOTHING BEFORE IT:

---
👉 ZAI DECISION: [Better Fit Lender DNA] — [Strong / Moderate / Weak] Approval Path

• [Reason 1 — most important]
• [Reason 2]  
• [Reason 3 — OFI/state context]

Primary Risk: [One sentence]
Required Docs: [2-3 most critical]
Higher historical fit:: [Lender DNA] first — [lowest fit DNA] is lower profile fit for this file
---

THEN: DTI calculation, income notes, score erosion warning if relevant. Keep it tight.

LENDER DNA CATEGORIES:
- FHA-Specialist Profile: low overlay, SSDI/self-employed friendly. Examples: CrossCountry 5.5%, Guild 7.1%, UWM 19.9%, Planet Home 23.5%, Freedom 24.4% (HMDA 2024)
- Flexible-Conventional Profile: moderate overlay, W2 strong, 640+ FICO
- Portfolio/Non-QM Profile: bank statement income, DTI 55%+, self-employed friendly
- Conservative-Bank Profile: jumbo/conventional, low DTI, high FICO required

PROFILE FIT: Strong Fit / Moderate Fit / Weak Fit (never use percentages)

STATE OFI: Always include. Texas OFI 30 (lowest), DC OFI 80 (highest), National OFI 47 (Q2 2026, moderate-tightening)

VERIFIED DATA ONLY:
HMDA 2018-2024 FHA Denial Rate Trends (CFPB verified):
Loan Purpose DNA (2018-2024 CFPB HMDA):
- CrossCountry: Higher historical purchase approval rate (76.7% purchase denials)
- Guild: Higher historical purchase approval rate (64.6%)
- NewRez/Freedom/Mr.Cooper: Higher historical cash-out denial ratio (70-75%) — High denial ratio for cash-out
- Rocket/loanDepot: Higher historical cash-out denial ratio (56-61%) — risky for cash-out
- UWM/Planet Home: Balanced
Routing: Cash-out → CrossCountry/Guild/Planet Home | Purchase → CrossCountry/UWM/Guild | High cash-out denial ratio: NewRez/Freedom/Mr.Cooper/Rocket/loanDepot

Key trends (2018→2024):
- CrossCountry: 8.6%→5.5% (historically maintained lower FHA denial rates, 7yr range 5-9%)
- UWM: 15.7%→19.9% (gradual tightening, follows OFI)
- Freedom Mortgage: 49%→7.6%→24.4% (volatile — COVID FHA push, now re-tightening)
- PennyMac: 52.8%→26.6% (major improvement — invested in FHA)
- Rocket: 34.8%→28.4% (slowly improving but consistently high)
- loanDepot: 40%→24.5%→37% (bottomed 2020, re-tightening — avoid borderline)
- Wells Fargo: 46.7%→58.5% (EXITING FHA market — +11.8pp in 7 years)

2024 rates (CFPB verified):
- CrossCountry Mortgage: 5.5% — FHA-Specialist
- Guild Mortgage: 7.1% — FHA-Specialist
- UWM: 19.9% — FHA-Specialist (wholesale)
- Planet Home Lending: 23.5% — FHA-Specialist
- Freedom Mortgage: 24.4% — FHA-Specialist
- Mr. Cooper: 25.2% — Flexible-Conventional
- PennyMac: 26.6% — Flexible-Conventional
- Rocket Mortgage: 28.4% — Flexible-Conventional
- loanDepot: 37.0% — Conservative-Bank
- NewRez: 47.8% — Conservative-Bank
- Wells Fargo: 58.5% — Conservative-Bank

LANGUAGE RULES — NEVER SAY:
- "Do NOT apply to X" → say "lower profile fit for X"
- "Skip these" → say "lower profile fit"
- "avoid X entirely" → say "weak fit for this profile"
- "Don't waste an application" → say "each application outside 45-day window has credit score impact"
- Specific approval percentages → use Strong/Moderate/Weak Fit

SCOPE: US mortgage only. If asked anything outside mortgage/lending, politely decline.

TONE: Direct. Data-driven. No filler. Broker-grade.`;

var messages = [];
var isLoading = false;

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

function askSuggestion(el){
  document.getElementById('userInput').value=el.textContent;
  document.getElementById('suggestions').style.display='none';
  sendMessage();
}

function hideGreeting(){var g=document.getElementById('greeting');if(g)g.style.display='none';var s=document.getElementById('suggestions');if(s)s.style.display='none';}
function addMessage(role, content){
  hideGreeting();
  var box = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + (role === 'ai' ? 'assistant' : 'user');
  div.innerHTML = formatMessage(content);
  box.appendChild(div);
  scrollToBottom();
  return div;
}

function formatMessage(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(.)/,'<p>$1')
    .replace(/(.)$/,'$1</p>')
    .replace(/- (.+)/g,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>');
}

function showTyping(){

// ─── DENIAL CASE FEEDBACK LOOP ───────────────────────────────────────────────
// Zai'nin VERDICT içeren cevaplarından anonim vaka verisi çıkarır
// overlay-intelligence.json için feedback signal üretir

function extractAndStoreDenialCase(reply, conversationHistory) {
  try {
    // VERDICT var mı?
    var verdictMatch = reply.match(/VERDICT:\s*(LENDER OVERLAY|AGENCY RULE|MIXED|CANNOT DETERMINE)/i);
    if (!verdictMatch) return;
    
    var verdict = verdictMatch[1].toUpperCase();
    
    // Konuşma geçmişinden profil bilgilerini çıkar
    var fullConversation = conversationHistory.map(m => m.content).join(' ');
    
    // FICO çıkar
    var ficoMatch = fullConversation.match(/\b(fico|credit\s*score)[:\s]*(\d{3})\b/i);
    var fico = ficoMatch ? parseInt(ficoMatch[2]) : null;
    
    // DTI çıkar
    var dtiMatch = fullConversation.match(/\b(dti|debt.to.income)[:\s]*(\d{1,2}(?:\.\d+)?)\s*%?/i);
    var dti = dtiMatch ? parseFloat(dtiMatch[2]) : null;
    
    // Loan type çıkar
    var loanType = 'unknown';
    if (/\bfha\b/i.test(fullConversation)) loanType = 'FHA';
    else if (/\bva\b/i.test(fullConversation)) loanType = 'VA';
    else if (/\busda\b/i.test(fullConversation)) loanType = 'USDA';
    else if (/\bconventional\b/i.test(fullConversation)) loanType = 'Conventional';
    
    // Lender adı çıkar (varsa)
    var lenderMatch = fullConversation.match(/\b(wells\s*fargo|uwm|rocket|pennymac|loandepot|chase|bank\s*of\s*america)\b/i);
    var lender = lenderMatch ? lenderMatch[1].toLowerCase().replace(/\s+/g, '_') : 'unknown';
    
    // Kaç bankaya başvuruldu?
    var appCountMatch = fullConversation.match(/(\d+)\s*(lender|bank|institution)/i);
    var appCount = appCountMatch ? parseInt(appCountMatch[1]) : null;
    
    // Vaka objesi oluştur
    var denialCase = {
      timestamp: new Date().toISOString(),
      verdict: verdict,
      profile: {
        fico: fico,
        dti: dti,
        loan_type: loanType,
        lender_mentioned: lender,
        applications_count: appCount
      },
      ofi_context: 47,  // Current OFI
      quarter: 'Q2_2026',
      source: 'zai_conversation'
    };
    
    // SessionStorage'a ekle (bu session için)
    var existing = JSON.parse(sessionStorage.getItem('frc_denial_cases') || '[]');
    existing.push(denialCase);
    sessionStorage.setItem('frc_denial_cases', JSON.stringify(existing));
    
    // Overlay flag: Eğer LENDER OVERLAY ise, lender overlay veritabanını güncelleme sinyali
    if (verdict === 'LENDER OVERLAY' && lender !== 'unknown' && (fico || dti)) {
      var flags = JSON.parse(sessionStorage.getItem('frc_overlay_flags') || '[]');
      flags.push({
        lender: lender,
        loan_type: loanType,
        fico: fico,
        dti: dti,
        timestamp: new Date().toISOString(),
        signal: 'OVERLAY_CONFIRMED'
      });
      sessionStorage.setItem('frc_overlay_flags', JSON.stringify(flags));
      
      console.log('FRC: Overlay signal captured →', lender, loanType, 'FICO:', fico, 'DTI:', dti);
    }
    
    // Toplam vaka sayısını güncelle
    var totalCases = parseInt(localStorage.getItem('frc_total_cases') || '0') + 1;
    localStorage.setItem('frc_total_cases', totalCases);
    
    // ML eşiği kontrolü
    if (totalCases >= 100 && !localStorage.getItem('frc_ml_notified')) {
      localStorage.setItem('frc_ml_notified', 'true');
      console.log('FRC: ML activation threshold reached! 100 cases collected.');
    }
    
  } catch(e) {
    // Sessizce geç — kullanıcı deneyimini etkileme
  }
}

// ─── RATE LIMITING ────────────────────────────────────────────────────────────
var _rl = JSON.parse(sessionStorage.getItem('frc_rl') || '{"count":0,"window":0}');
function checkRateLimit() {
  var now = Date.now();
  if (now - _rl.window > 60000) { _rl = {count:0, window:now}; }
  if (_rl.count >= 15) return false; // 15 mesaj/dakika
  _rl.count++;
  sessionStorage.setItem('frc_rl', JSON.stringify(_rl));
  return true;
}

// ─── PROMPT INJECTION KORUMASI ────────────────────────────────────────────────
var INJECTION_PATTERNS = [
  /ignore (previous|above|all) instructions/i,
  /you are now/i,
  /forget (your|all|previous)/i,
  /system prompt/i,
  /\[INST\]|\[\/INST\]/i,
  /###\s*(system|instruction)/i,
  /<\|im_start\|>|<\|im_end\|>/i,
  /act as (a|an) (different|new|other)/i,
  /pretend (you are|to be)/i,
  /roleplay as/i,
  /jailbreak/i,
  /DAN mode/i,
];

function sanitizeInput(text) {
  // Injection pattern kontrolü
  for (var pattern of INJECTION_PATTERNS) {
    if (pattern.test(text)) {
      return null; // Engelle
    }
  }
  // Max uzunluk
  if (text.length > 2000) {
    return text.substring(0, 2000);
  }
  return text;
}

// ─── LLM JUDGE — CEVAP GÜVENLİK KONTROLÜ ─────────────────────────────────────
// OUTPUT CLEANER — yasal ve dilsel sorunları temizle
function cleanZaiOutput(text) {
  // 1. "Do NOT apply to X" → "Lower profile fit for X"
  text = text.replace(/Do NOT apply (directly )?to ([A-Za-z\s,]+)\./gi, 
    function(m, p1, p2) { return 'Lower profile fit for ' + p2.trim() + '.'; });
  
  // 2. "avoid conservative banks entirely" → "conservative-bank DNA: weak fit"
  text = text.replace(/avoid conservative banks entirely/gi, 
    'conservative-bank DNA: weak fit for self-employed profiles');
  text = text.replace(/avoid (submitting to|applying to) ([A-Za-z\s]+)/gi,
    function(m, p1, p2) { return 'lower profile fit for ' + p2.trim(); });
  
  // 3. "Skip these" → remove
  text = text.replace(/Skip these\./gi, 'Lower profile fit for this scenario.');
  text = text.replace(/Not worth the application\./gi, 'Lower profile fit — prioritize better-matched lenders.');
  
  // 4. Yüzde sayıları → Strong/Moderate/Weak (sadece approval fit score context)
  text = text.replace(/Approval (odds|probability)[:\s]+(\d+[-–]\d+)%/gi, 
    function(m, p1, p2) {
      var avg = parseInt(p2);
      var fit = avg >= 70 ? 'Strong Fit' : avg >= 50 ? 'Moderate Fit' : 'Weak Fit';
      return 'Profile Fit: ' + fit;
    });
  
  // 5. "Do NOT" genel → "Lower priority"
  text = text.replace(/Do NOT ([a-z]+)/gi, function(m, p1) {
    return 'Lower priority: ' + p1;
  });

  return text;
}

async function judgeResponse(response, apiKey) {
  // Sadece şüpheli cevaplar için çalış — performans için
  var suspicious = [
    /ignore|forget|pretend|roleplay/i,
    /i am now|i will now act/i,
    /\[system\]|\[admin\]/i,
  ];
  
  var needsCheck = suspicious.some(p => p.test(response));
  if (!needsCheck) return true; // Güvenli
  
  try {
    var judgeResp = await fetch('https://frc-api.ziyetis.workers.dev/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'frc-proxy',
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 50,
        messages: [{
          role: 'user',
          content: `Is this mortgage advice response safe and on-topic? Reply only YES or NO.\n\nResponse: "${response.substring(0, 500)}"`
        }]
      })
    });
    var judgeData = await judgeResp.json();
    var verdict = judgeData?.content?.[0]?.text || 'YES';
    return verdict.trim().toUpperCase().startsWith('YES');
  } catch(e) {
    return true; // Hata durumunda geç ver
  }
}

async function fetchWithRetry(url, options, retries=2) {
  for(let i=0; i<=retries; i++) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 25000);
      const res = await fetch(url, {...options, signal: controller.signal});
      clearTimeout(timeout);
      if(res.ok) return res;
      if(i === retries) throw new Error('HTTP ' + res.status);
    } catch(e) {
      if(i === retries) throw e;
      await new Promise(r => setTimeout(r, 1500 * (i+1)));
    }
  }
}

async function sendMessage(){
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if(!text || isLoading) return;

  // Rate limit kontrolü
  if (!checkRateLimit()) {
    addMessage('ai', 'You\'ve sent a lot of messages quickly. Please wait a moment before continuing.');
    return;
  }

  // Injection kontrolü
  var safeText = sanitizeInput(text);
  if (safeText === null) {
    addMessage('ai', 'I can only help with mortgage and lending questions. Please ask about your loan situation.');
    return;
  }
  text = safeText;

  document.getElementById('suggestions').style.display = 'none';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  messages.push({role: 'user', content: text});
  showTyping();

  try {
    if(!window._AKEY) {
      removeTyping();
      addMessage('ai', 'To activate Zai, please enter your API key. Refresh the page to enter it.');
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }
    var response = await fetchWithRetry('https://frc-api.ziyetis.workers.dev/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'frc-proxy', // Handled by Cloudflare Worker
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 3000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    var data = await response.json();
    removeTyping();

    if (data) {
      var reply = "";
      if (data.reply) {
        reply = data.reply;
      } else if (data.content && Array.isArray(data.content)) {
        for (var i = 0; i < data.content.length; i++) {
          if (data.content[i].type === "text") {
            reply = data.content[i].text;
            break;
          }
        }
      }
      if (!reply) reply = JSON.stringify(data);
      
      // LLM Judge kontrolü
      var isSafe = await judgeResponse(reply, window._AKEY);
      if (!isSafe) {
        reply = "I can only provide mortgage and lending guidance. Please ask about your loan situation, denial letter, or lender overlays.";
      }
      
      messages.push({role: 'assistant', content: reply});
      addMessage('ai', reply);
      
      // ─── FEEDBACK LOOP: Extract denial case data ──────────────────────────
      extractAndStoreDenialCase(reply, messages);
      
    } else if (data && data.error) {
      addMessage('ai', 'Error: ' + (data.error.message || 'Please try again.'));
    } else {
      addMessage('ai', 'Systems are currently experiencing high traffic. Please try your request again shortly.');
    }
  } catch(err) {
    removeTyping();
    addMessage('ai', 'Connecting... please wait a moment and try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

// File upload handler
function handleFile(input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  
  if(file.type === 'application/pdf'){
    // For PDF - tell Zai about it
    addMessage('user', '📎 I uploaded my credit report: ' + file.name);
    messages.push({role:'user', content:'I just uploaded my credit report PDF: ' + file.name + '. Please ask me to describe what negative items you see, or I can paste key sections.'});
    sendToZai();
  } else if(file.type.startsWith('image/')){
    // For images - convert to base64 and send
    reader.onload = function(e){
      var base64 = e.target.result.split(',')[1];
      addMessage('user', '📎 Uploaded credit report image');
      // Send as vision message
      fetch('https://frc-api.ziyetis.workers.dev/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': 'frc-proxy', // Handled by Cloudflare Worker
          'anthropic-version': '2023-06-01',
          },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 3000,
          system: SYSTEM_PROMPT,
          messages: [{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:file.type, data:base64}},
            {type:'text', text:'This is my credit report. Please analyze it: identify any negative items (late payments, collections, charge-offs), estimate which ones might be disputable, and tell me what fixing them could mean for my mortgage rate.'}
          ]}]
        })
      })
      .then(function(r){return r.json();})
      .then(function(data){
        if(data) {
          var reply = "";
          if (data.reply) {
            reply = data.reply;
          } else if (data.content && Array.isArray(data.content)) {
            for (var ci = 0; ci < data.content.length; ci++) {
              if (data.content[ci].type === "text") { reply = data.content[ci].text; break; }
            }
          }
          if (!reply) reply = data.error || "No response";
          messages.push({role:'assistant', content:reply});
          addMessage('ai', reply);
        }
      })
      .catch(function(){ addMessage('ai', 'Could not analyze the image. Please describe the negative items you see.'); });
    };
    reader.readAsDataURL(file);
  }
  input.value = '';
}

function sendToZai(){
  // Trigger the existing send flow
  sendMessage();
}

// Voice input
var recognition = null;
var micActive = false;
function toggleMic(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('Voice input not supported in this browser. Try Chrome.');
    return;
  }
  if(micActive){ recognition.stop(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = function(){ micActive=true; document.getElementById('micBtn').textContent='🔴'; document.getElementById('micBtn').style.color='#ff6b6b'; };
  recognition.onresult = function(e){ 
    var txt = e.results[0][0].transcript;
    document.getElementById('userInput').value = txt;
  };
  recognition.onend = function(){ micActive=false; document.getElementById('micBtn').textContent='🎤'; document.getElementById('micBtn').style.color='rgba(255,255,255,0.4)'; };
  recognition.start();
}
