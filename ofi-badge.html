<!DOCTYPE html>

*{margin:0;padding:0;box-sizing:border-box;}

.value{font-size:36px;font-weight:900;color:#c8a44a;line-height:1;font-family:Georgia,serif;}
.sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;}
.trend{font-size:11px;color:#f0a020;margin-top:2px;}
.source{font-size:9px;color:rgba(255,255,255,0.2);margin-top:8px;border-top:1px solid rgba(255,255,255,0.07);padding-top:7px;}
.source a{color:rgba(200,164,74,0.4);text-decoration:none;}
</style>
</head>
<body>
<div class="badge">
  <div class="label">FRC Overlay Friction Index</div>
