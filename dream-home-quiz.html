function getMidPrice(data, loc, type, beds){
  try{
    var t = type === 'duplex' ? 'single-family' : type;
    var b = beds === '5br' ? '4br' : beds === '2br' ? '3br' : beds;
    var cities = data[loc].cities[t];
    if(!cities) cities = data[loc].cities[Object.keys(data[loc].cities)[0]];
    var cityList = cities[b];
    if(!cityList) cityList = cities[Object.keys(cities)[0]];
    var priceStr = cityList[1].price;
    var nums = priceStr.match(/\$(\d+)K/g);
    if(nums && nums.length >= 2){
      var low = parseInt(nums[0].replace(/\$|K/g,''))*1000;
      var high = parseInt(nums[1].replace(/\$|K/g,''))*1000;
      return Math.round((low+high)/2);
    }
    return 450000;
  }catch(e){return 450000;}
}

  var mo = Math.round(midPrice*0.8*(rate/100/12)*Math.pow(1+rate/100/12,360)/(Math.pow(1+rate/100/12,360)-1));
  var mo740 = Math.round(midPrice*0.8*(6.1/100/12)*Math.pow(1+6.1/100/12,360)/(Math.pow(1+6.1/100/12,360)-1));
  var creditSavings = (mo - mo740) * 360;

  // Get cities
  var cityType = (type === 'duplex') ? 'single-family' : type;
  var cityBed = (beds === '5br') ? '4br' : (beds === '2br') ? '3br' : beds;
  var cityData = data.cities[cityType] || data.cities[Object.keys(data.cities)[0]];
  var cities = cityData[cityBed] || cityData[Object.keys(cityData)[0]];

  var featureEmoji = {pool:"🏊", garage:"🚗", school:"🎓", "no-hoa":"🏗️"}[feature] || "⭐";
  var featureLabel = {pool:"Pool & Outdoor Space", garage:"2+ Car Garage", school:"Top School District", "no-hoa":"No HOA"}[feature] || feature;
  var timelineLabel = {asap:"ASAP (6 months)", "1-2yr":"1-2 Years", "3-5yr":"3-5 Years", exploring:"Just Exploring"}[timeline] || timeline;
  var bedsLabel = {_2br:"2 Bedrooms", _3br:"3 Bedrooms", _4br:"4 Bedrooms", _5br:"5+ Bedrooms"}['_'+beds] || beds;
  var typeLabel = {"single-family":"Single Family", condo:"Condo", townhouse:"Townhouse", duplex:"Duplex"}[type] || type;

  var shareText = 'My dream home profile:\n\n'+data.emoji+' '+data.label+'\n🏠 '+typeLabel+' · '+bedsLabel+'\n'+featureEmoji+' '+featureLabel+'\n💰 Price range: '+data.priceRange.mid+'\n📅 Timeline: '+timelineLabel+'\n\nFind your dream home cost:\nfinanceratecalc.com/dream-home-quiz.html';

  var skyblueHTML = '';
  if(credit < 720){
    skyblueHTML = '<div class="skyblue-box">'+
      '<div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(192,57,43,0.8);font-weight:700;margin-bottom:8px;">💳 Your Credit Score is Delaying Your Dream</div>'+
      '<div style="font-family:\'Fraunces\',serif;font-size:28px;font-weight:900;color:#ff6b6b;margin-bottom:6px;">$'+Math.round(creditSavings).toLocaleString()+' more</div>'+
      '<div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:16px;">vs a 740 score on the same home over 30 years. Improving your score is the fastest path to your dream home.</div>'+
      '<a href="https://www.skyblue.org/?pap=1006366&coupon=frc20&subid=DREAM_QUIZ_'+loc.toUpperCase()+'_FRC" target="_blank" rel="sponsored" style="display:inline-block;background:#c0392b;color:#fff;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">🛡️ Fix My Score — Sky Blue Credit #ad</a>'+
      '<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:8px;">Not financial advice · Individual results vary</div>'+
      '</div>';
  }

  var r = document.getElementById('resultWrap');
  r.style.display = 'block';
  r.innerHTML =
    '<div class="dream-card">'+
      '<div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(200,164,74,0.7);font-weight:700;margin-bottom:10px;">🏡 Your Dream Home Profile</div>'+
      '<div class="dream-title">'+data.emoji+' '+data.label+'</div>'+
      '<div class="dream-subtitle">'+typeLabel+' · '+bedsLabel+' · '+featureLabel+'</div>'+
      '<div class="dream-tags">'+
        '<span class="dream-tag">'+data.emoji+' '+data.label+'</span>'+
        '<span class="dream-tag">🏠 '+typeLabel+'</span>'+
        '<span class="dream-tag">🛏️ '+bedsLabel+'</span>'+
        '<span class="dream-tag">'+featureEmoji+' '+featureLabel+'</span>'+
        '<span class="dream-tag">📅 '+timelineLabel+'</span>'+
      '</div>'+
      '<div class="price-range">'+
        '<div class="price-box"><div class="price-num">'+data.priceRange.low+'</div><div class="price-label">Budget Option</div></div>'+
        '<div class="price-box" style="border:1px solid rgba(200,164,74,0.3);"><div class="price-num">'+data.priceRange.mid+'</div><div class="price-label">Sweet Spot</div></div>'+
        '<div class="price-box"><div class="price-num">'+data.priceRange.high+'</div><div class="price-label">Premium</div></div>'+
      '</div>'+
      '<div class="cities">'+
        '<div class="cities-title">Best Cities For Your Profile</div>'+
        '<div class="city-list">'+
        cities.map(function(c){
          return '<div class="city-row"><span class="city-name">'+c.city+'</span><span class="city-price">'+c.price+'</span><span class="city-tag" style="background:'+c.tagColor+'20;color:'+c.tagColor+';border:1px solid '+c.tagColor+'40;">'+c.tag+'</span></div>';
        }).join('')+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="gap-box">'+
      '<div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(192,57,43,0.8);font-weight:700;margin-bottom:14px;">📊 Your Gap Analysis</div>'+
      '<div class="gap-grid">'+
        '<div><div class="gap-num" style="color:#6bffb8;">$'+salary+'K</div><div class="gap-label">Your Salary</div></div>'+
        '<div><div class="gap-num" style="color:var(--gold);">$'+salaryNeeded+'K</div><div class="gap-label">Salary Needed</div></div>'+
        '<div><div class="gap-num" style="color:'+(gap>0?'#ff6b6b':'#6bffb8')+';">'+(gap>0?'$'+gap+'K short':'✅ Qualified')+'</div><div class="gap-label">'+(gap>0?yearsNeeded+' yrs to close':'You qualify now')+'</div></div>'+
      '</div>'+
      '<div style="margin-top:14px;font-size:13px;color:rgba(255,255,255,0.5);border-top:1px solid rgba(255,255,255,0.08);padding-top:12px;">'+
        'Est. monthly payment at '+rate+'%: <strong style="color:#fff;">$'+mo.toLocaleString()+'/mo</strong> · '+
        (credit < 720 ? 'At 740+ score: <strong style="color:#6bffb8;">$'+mo740.toLocaleString()+'/mo</strong>' : '✅ You\'re getting near-best rates')+
      '</div>'+
    '</div>'+

    skyblueHTML+

    '<div class="green-box">'+
      '<div style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(39,174,96,0.8);font-weight:700;margin-bottom:8px;">🎯 Your Next Step</div>'+
      '<div style="font-size:15px;color:rgba(255,255,255,0.7);margin-bottom:14px;">See exactly what you qualify for right now — and which lender type fits your profile.</div>'+
      '<a href="bank-rejection-engine.html" style="display:inline-block;background:#27ae60;color:#fff;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;">Check My Approval Odds →</a>'+
    '</div>'+

    '<div class="share-box">'+
      '<div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:10px;">Share your dream home profile</div>'+
      '<div class="share-preview" id="sharePreview">'+shareText+'</div>'+
      '<button class="share-btn" onclick="doCopy()">📋 Copy</button>'+
      '<button class="share-btn" onclick="doTweet()">🐦 Tweet</button>'+
    '</div>'+
    '<div class="restart" onclick="restartQuiz()">↩ Take the quiz again</div>';
}

function doCopy(){navigator.clipboard.writeText(document.getElementById('sharePreview').textContent).then(function(){alert('Copied!');});}
function doTweet(){window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(document.getElementById('sharePreview').textContent),'_blank');}
function restartQuiz(){
  answers={};current=0;
  document.getElementById('resultWrap').style.display='none';
  document.getElementById('quizWrap').style.display='block';
  render();
}
render();
</script>
</body>
</html>
