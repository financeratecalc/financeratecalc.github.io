<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zai One — Mortgage Routing Engine | FinanceRateCalc</title>
<meta name="description" content="Submit a borrower profile. Get one routing decision. FHA-Specialist, Conventional, Portfolio — instantly.">
<link rel="canonical" href="https://financeratecalc.com/zai-one.html">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ND9P4F3PHT"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-ND9P4F3PHT');</script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0B132B;--navy2:#0f1a36;
  --gold:#C8A84B;--gold2:rgba(200,168,75,0.15);
  --green:#6bffb8;--red:#e8845a;
  --white:#fff;--dim:rgba(255,255,255,0.45);
  --border:rgba(255,255,255,0.08);
  --card:rgba(255,255,255,0.04);
}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

header{background:rgba(11,19,43,0.97);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);backdrop-filter:blur(10px);}
.logo{font-family:'Fraunces',serif;font-size:17px;font-weight:900;color:var(--white);text-decoration:none;}
.logo em{font-style:italic;color:var(--gold);}
.ofi-pill{font-size:12px;color:var(--gold);text-decoration:none;font-weight:700;background:rgba(200,168,75,0.1);border:1px solid rgba(200,168,75,0.25);padding:4px 12px;border-radius:20px;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 60px);}

/* LEFT */
.panel-left{border-right:1px solid var(--border);padding:28px;overflow-y:auto;background:rgba(0,0,0,0.15);}
.panel-title{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.field input,.field select{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;font-size:14px;color:var(--white);
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color 0.15s;
}
.field input:focus,.field select:focus{border-color:rgba(200,168,75,0.5);}
.field select option{background:#0f1a36;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.submit-btn{
  width:100%;margin-top:18px;padding:14px;
  background:var(--gold);color:#000;border:none;border-radius:10px;
  font-family:'Fraunces',serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:opacity 0.15s;letter-spacing:0.02em;
}
.submit-btn:hover{opacity:0.88;}
.submit-btn:disabled{opacity:0.35;cursor:not-allowed;}

.market-signal{margin-top:18px;padding:14px 16px;background:var(--gold2);border:1px solid rgba(200,168,75,0.2);border-radius:10px;}
.ms-label{font-size:10px;color:rgba(200,168,75,0.6);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.ms-num{font-family:'Fraunces',serif;font-size:32px;font-weight:900;color:var(--gold);line-height:1;}
.ms-sub{font-size:12px;color:var(--dim);margin-top:4px;}

.gumroad-cta{margin-top:14px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;text-align:center;}
.gumroad-cta p{font-size:11px;color:var(--dim);margin-bottom:8px;}
.gumroad-cta a{display:block;padding:9px;background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.3);color:var(--gold);border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;}
.gumroad-cta a:hover{background:rgba(200,168,75,0.2);}

/* RIGHT */
.panel-right{padding:28px;display:flex;flex-direction:column;}

.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;opacity:0.2;}
.empty-arrow{font-size:40px;margin-bottom:12px;}
.empty-text{font-family:'DM Mono',monospace;font-size:13px;line-height:1.8;}

.loading{display:none;align-items:center;gap:12px;padding:20px 0;color:var(--dim);font-size:14px;}
.loading.show{display:flex;}
.dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,100%{opacity:0.25;}50%{opacity:1;}}

/* DECISION */
.decision{display:none;flex-direction:column;gap:14px;}
.decision.show{display:flex;}

.d-header{padding:22px 24px;border:1px solid rgba(200,168,75,0.3);border-radius:12px;background:rgba(200,168,75,0.05);}
.d-label{font-size:10px;font-weight:700;color:rgba(200,168,75,0.6);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}
.d-route{font-family:'Fraunces',serif;font-size:24px;font-weight:900;line-height:1.1;margin-bottom:10px;}
.d-fit{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.fit-strong{background:rgba(107,255,184,0.1);color:var(--green);border:1px solid rgba(107,255,184,0.25);}
.fit-moderate{background:rgba(200,168,75,0.1);color:var(--gold);border:1px solid rgba(200,168,75,0.3);}
.fit-weak{background:rgba(232,132,90,0.1);color:var(--red);border:1px solid rgba(232,132,90,0.25);}

.d-reasons{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;}
.d-reasons-title{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;}
.reason{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6;color:rgba(255,255,255,0.8);}
.reason:last-child{border:none;padding-bottom:0;}
.rbullet{color:var(--gold);font-family:'DM Mono',monospace;font-size:11px;flex-shrink:0;margin-top:2px;}

.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.d-card{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;}
.d-card.risk{border-left:2px solid var(--red);}
.d-card.docs{border-left:2px solid var(--gold);}
.d-card.submit{border-left:2px solid var(--green);}
.d-card.lower{border-left:2px solid rgba(255,255,255,0.15);}
.dc-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.dc-val{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.6;}

.d-ofi{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
.d-ofi-text{font-size:13px;color:var(--dim);}
.d-ofi-num{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--gold);}

.d-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;}
.d-detail-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.d-detail-text{font-size:13px;color:rgba(255,255,255,0.65);line-height:1.85;}

.legal{font-size:11px;color:rgba(255,255,255,0.2);line-height:1.7;padding-top:4px;}
.legal a{color:rgba(255,255,255,0.25);}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .panel-left{border-right:none;border-bottom:1px solid var(--border);}
  header{padding:0 20px;}
  .panel-left,.panel-right{padding:20px;}
  .d-grid{grid-template-columns:1fr;}
  .grid2{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header>
  <a href="/index.html" class="logo">Finance<em>Rate</em>Calc</a>
  <a href="/ofi.html" class="ofi-pill">OFI 47 →</a>
</header>

<div class="layout">
  <div class="panel-left">
    <div class="panel-title">Borrower Profile</div>

    <div class="grid2">
      <div class="field">
        <label>FICO Score</label>
        <input type="number" id="fico" placeholder="612" min="300" max="850">
      </div>
      <div class="field">
        <label>DTI % <span id="dtiToggle" onclick="toggleDTI()" style="color:var(--gold);cursor:pointer;font-size:10px;text-transform:none;letter-spacing:0;margin-left:4px;">calculate →</span></label>
        <input type="number" id="dti" placeholder="48 (or calculate →)" min="0" max="70">
      </div>
    </div>

    <!-- DTI Calculator — hidden by default -->
    <div id="dtiCalc" style="display:none;background:rgba(200,168,75,0.06);border:1px solid rgba(200,168,75,0.2);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:10px;font-weight:700;color:rgba(200,168,75,0.7);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;">DTI Calculator</div>
      <div class="grid2">
        <div class="field">
          <label>Monthly Income ($)</label>
          <input type="number" id="income" placeholder="6500" oninput="calcDTI()">
        </div>
        <div class="field">
          <label>Home Price ($)</label>
          <input type="number" id="homePrice" placeholder="320000" oninput="calcDTI()">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Car Payment ($)</label>
          <input type="number" id="car" placeholder="420" oninput="calcDTI()">
        </div>
        <div class="field">
          <label>Credit Cards ($)</label>
          <input type="number" id="cards" placeholder="180" oninput="calcDTI()">
        </div>
      </div>
      <div class="field">
        <label>Other Monthly Debts ($)</label>
        <input type="number" id="other" placeholder="0" oninput="calcDTI()">
      </div>
      <div id="dtiResult" style="font-size:13px;color:var(--dim);margin-top:6px;"></div>
    </div>

    <div class="field">
      <label>Loan Type</label>
      <select id="loanType">
        <option value="FHA">FHA</option>
        <option value="Conventional">Conventional</option>
        <option value="VA">VA</option>
        <option value="USDA">USDA</option>
        <option value="Non-QM / Portfolio">Non-QM / Portfolio</option>
      </select>
    </div>

    <div class="grid2">
      <div class="field">
        <label>Income Type</label>
        <select id="incomeType">
          <option value="W2">W2 Employment</option>
          <option value="Self-Employed">Self-Employed</option>
          <option value="SSDI">SSDI / Disability</option>
          <option value="1099 / Contract">1099 / Contract</option>
          <option value="Retirement">Retirement</option>
        </select>
      </div>
      <div class="field">
        <label>State</label>
        <select id="state">
          <option value="TX|30">Texas (OFI 30)</option>
          <option value="UT|30">Utah (OFI 30)</option>
          <option value="GA|38">Georgia (OFI 38)</option>
          <option value="FL|42">Florida (OFI 42)</option>
          <option value="CA|51">California (OFI 51)</option>
          <option value="NY|55">New York (OFI 55)</option>
          <option value="DC|80">DC (OFI 80)</option>
          <option value="Other|47">Other State</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Prior Denial</label>
      <select id="denied">
        <option value="none">No prior denial</option>
        <option value="Rocket Mortgage (28.4% FHA denial rate)">Rocket Mortgage</option>
        <option value="Wells Fargo (58.5% FHA denial rate)">Wells Fargo</option>
        <option value="loanDepot (37.0% FHA denial rate)">loanDepot</option>
        <option value="PennyMac (26.6% FHA denial rate)">PennyMac</option>
        <option value="Chase">Chase</option>
        <option value="Other lender">Other lender</option>
      </select>
    </div>

    <div class="field">
      <label>Context (optional)</label>
      <input type="text" id="context" placeholder="e.g. 2 late payments 2022, self-employed 3 yrs">
    </div>

    <button class="submit-btn" onclick="getDecision()" id="btn">Get Routing Decision →</button>

    <div class="market-signal">
      <div class="ms-label">Market OFI Signal</div>
      <div class="ms-num">47</div>
      <div class="ms-sub">Q2 2026 — Moderate, Re-tightening</div>
    </div>

    <div class="gumroad-cta">
      <p>Unlimited routing decisions for licensed brokers</p>
      <a href="https://ziyetis.gumroad.com/l/ixxar" target="_blank">Zai for Brokers — $49/month →</a>
    </div>
  </div>

  <div class="panel-right">
    <div class="empty-state" id="empty">
      <div class="empty-arrow">→</div>
      <div class="empty-text">Submit a profile<br>to get the routing decision</div>
    </div>

    <div class="loading" id="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>Analyzing profile...</span>
    </div>

    <div class="decision" id="decision"></div>
  </div>
</div>

<script>

function toggleDTI() {
  var calc = document.getElementById('dtiCalc');
  var toggle = document.getElementById('dtiToggle');
  if(calc.style.display === 'none') {
    calc.style.display = 'block';
    toggle.textContent = 'hide ↑';
  } else {
    calc.style.display = 'none';
    toggle.textContent = 'calculate →';
  }
}

function calcDTI() {
  var income = parseFloat(document.getElementById('income').value) || 0;
  var homePrice = parseFloat(document.getElementById('homePrice').value) || 0;
  var car = parseFloat(document.getElementById('car').value) || 0;
  var cards = parseFloat(document.getElementById('cards').value) || 0;
  var other = parseFloat(document.getElementById('other').value) || 0;

  if(!income || !homePrice) {
    document.getElementById('dtiResult').textContent = 'Enter income and home price to calculate';
    return;
  }

  // Loan amount (assume 5% down)
  var loanAmt = homePrice * 0.95;
  // Monthly P&I at 6.6% 30yr
  var rate = 0.066/12;
  var n = 360;
  var pi = loanAmt * rate * Math.pow(1+rate,n) / (Math.pow(1+rate,n)-1);
  // Property tax (avg 0.8%), insurance, PMI
  var tax = homePrice * 0.008 / 12;
  var ins = 120;
  var pmi = loanAmt * 0.008 / 12;
  var housing = pi + tax + ins + pmi;
  var totalDebt = housing + car + cards + other;
  var dti = (totalDebt / income * 100).toFixed(1);

  // Auto-fill DTI field
  document.getElementById('dti').value = dti;

  var color = dti < 43 ? '#6bffb8' : dti < 50 ? '#C8A84B' : '#e8845a';
  document.getElementById('dtiResult').innerHTML = 
    'Est. housing: $' + Math.round(housing).toLocaleString() + '/mo &nbsp;·&nbsp; ' +
    'Total debts: $' + Math.round(totalDebt).toLocaleString() + '/mo &nbsp;·&nbsp; ' +
    '<strong style="color:' + color + '">DTI: ' + dti + '%</strong>';
}

async function getDecision() {
  const fico = document.getElementById('fico').value;
  const dti = document.getElementById('dti').value;
  if(!fico||!dti){alert('Please enter FICO and DTI.');return;}

  const loanType = document.getElementById('loanType').value;
  const income = document.getElementById('incomeType').value;
  const stateVal = document.getElementById('state').value.split('|');
  const state = stateVal[0], ofi = stateVal[1]||'47';
  const denied = document.getElementById('denied').value;
  const ctx = document.getElementById('context').value;

  document.getElementById('btn').disabled = true;
  document.getElementById('empty').style.display = 'none';
  document.getElementById('decision').classList.remove('show');
  document.getElementById('loading').classList.add('show');

  const prompt = `Borrower: FICO ${fico}, DTI ${dti}%, ${loanType}, ${income} income, ${state} (OFI ${ofi}), prior denial: ${denied==='none'?'none':denied}. Context: ${ctx||'none'}. Market OFI: 47 (Q2 2026, moderate-tightening).

Respond ONLY in this exact format, one line each:
ROUTE: [FHA-Specialist / Flexible-Conventional / Portfolio-NonQM / Conservative-Bank]
FIT: [Strong / Moderate / Weak]
R1: [reason one line]
R2: [reason one line]
R3: [OFI/state context one line]
RISK: [primary risk one sentence]
DOCS: [2-3 docs comma separated]
SUBMIT: [lender DNA to submit to]
LOWER: [lower fit DNA and why — one line]
OFI: [state OFI impact one line]
DETAIL: [3-4 sentence broker analysis]`;

  try {
    const res = await fetch('https://frc-api.ziyetis.workers.dev/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'frc-proxy'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const txt = data.content?.[0]?.text || data.reply || '';

    const g = k => { const m = txt.match(new RegExp(k+':\\s*(.+)')); return m?m[1].trim():''; };

    const route=g('ROUTE'),fit=g('FIT'),r1=g('R1'),r2=g('R2'),r3=g('R3');
    const risk=g('RISK'),docs=g('DOCS'),submit=g('SUBMIT'),lower=g('LOWER');
    const ofiLine=g('OFI'),detail=g('DETAIL');

    const fitCls = fit==='Strong'?'fit-strong':fit==='Weak'?'fit-weak':'fit-moderate';

    document.getElementById('decision').innerHTML = `
      <div class="d-header">
        <div class="d-label">Routing Decision</div>
        <div class="d-route">${route||'FHA-Specialist'}</div>
        <span class="d-fit ${fitCls}">${fit||'Moderate'} Approval Path</span>
      </div>

      <div class="d-reasons">
        <div class="d-reasons-title">Why This Route</div>
        ${r1?`<div class="reason"><span class="rbullet">01</span>${r1}</div>`:''}
        ${r2?`<div class="reason"><span class="rbullet">02</span>${r2}</div>`:''}
        ${r3?`<div class="reason"><span class="rbullet">03</span>${r3}</div>`:''}
      </div>

      <div class="d-grid">
        <div class="d-card risk"><div class="dc-label">Primary Risk</div><div class="dc-val">${risk||'—'}</div></div>
        <div class="d-card docs"><div class="dc-label">Required Docs</div><div class="dc-val">${docs||'—'}</div></div>
        <div class="d-card submit"><div class="dc-label">Submit To</div><div class="dc-val">${submit||route}</div></div>
        <div class="d-card lower"><div class="dc-label">Lower Profile Fit</div><div class="dc-val">${lower||'—'}</div></div>
      </div>

      <div class="d-ofi">
        <div class="d-ofi-text">${ofiLine||state+' — OFI '+ofi}</div>
        <div class="d-ofi-num">OFI ${ofi}</div>
      </div>

      ${detail?`<div class="d-detail"><div class="d-detail-label">Broker Analysis</div><div class="d-detail-text">${detail}</div></div>`:''}

      <div class="legal">Not financial or legal advice. Educational only. Approval fit labels are estimates based on HMDA 2024 data — individual outcomes vary. Consult a licensed mortgage professional. <a href="/terms.html">Terms</a></div>
    `;

    document.getElementById('loading').classList.remove('show');
    document.getElementById('decision').classList.add('show');

    if(typeof gtag!=='undefined') gtag('event','zai_one_decision',{event_category:'conversion',event_label:route});

  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('empty').style.display='flex';
    alert('Error: '+e.message);
  }
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
