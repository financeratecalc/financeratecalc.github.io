<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRC Mortgage API — Live Calculator Endpoint</title>
<style>
body{font-family:monospace;background:#08090c;color:#e2e8f0;padding:40px;max-width:800px;margin:0 auto;}
h1{color:#c8a44a;font-size:18px;margin-bottom:8px;}
.box{background:#0f1117;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:20px;margin-bottom:20px;}
.label{font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.url{color:#60a5fa;font-size:13px;word-break:break-all;}
input{background:#0f1117;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px 12px;color:#fff;font-family:monospace;font-size:13px;width:100%;}
label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:4px;}
button{background:#c8a44a;color:#08090c;border:none;border-radius:6px;padding:10px 24px;font-weight:700;cursor:pointer;font-size:13px;margin-top:12px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;}
pre{color:#a3e635;font-size:12px;overflow-x:auto;line-height:1.6;margin:0;}
</style>
</head>
<body>
<h1>⚡ FRC Mortgage API</h1>
<p style="color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:28px;">Live mortgage calculator endpoint — built for AI connectors, FUB integrations, and developers.</p>

<div class="box">
  <div class="label">Endpoint URL</div>
  <div class="url">https://financeratecalc.com/api/mortgage.html?price=650000&down=20&rate=6.5&term=30</div>
</div>

<div class="box">
  <div class="label">Live Test</div>
  <div class="grid">
    <div><label>Home Price ($)</label><input id="p" value="650000"></div>
    <div><label>Down (%)</label><input id="d" value="20"></div>
    <div><label>Rate (%)</label><input id="r" value="6.5"></div>
    <div><label>Term (yrs)</label><input id="t" value="30"></div>
    <div><label>Tax (%/yr)</label><input id="tx" value="1.1"></div>
    <div><label>Insurance ($/mo)</label><input id="ins" value="150"></div>
  </div>
  <button onclick="calc()">Calculate →</button>
</div>

<div class="box" id="out" style="border-color:rgba(39,174,96,0.3);">
  <div class="label">JSON Response</div>
  <pre id="json"></pre>
</div>

<div class="box">
  <div class="label">FUB Connector Tool Definition</div>
  <pre id="toolDef"></pre>
</div>

<script>
function fmt(n){return '$'+Math.round(n).toLocaleString();}

function calc(){
  var price=parseFloat(document.getElementById('p').value)||650000;
  var down=parseFloat(document.getElementById('d').value)||20;
  var rate=parseFloat(document.getElementById('r').value)||6.5;
  var term=parseFloat(document.getElementById('t').value)||30;
  var tax=parseFloat(document.getElementById('tx').value)||1.1;
  var ins=parseFloat(document.getElementById('ins').value)||150;

  var loan=price*(1-down/100);
  var mr=rate/100/12, n=term*12;
  var pi=loan*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
  var taxMo=price*tax/100/12;
  var pmi=down<20?loan*0.005/12:0;
  var total=pi+taxMo+ins+pmi;
  var totalInt=pi*n-loan;
  var reqIncome=total*12/0.28;

  var note = rate>7?'Rate above 7% — consider 2-1 buydown or ARM if selling within 5 years.':rate<6?'Excellent rate. Lock immediately if floating.':'Solid rate. Compare at least 3 lenders before committing.';

  var result={
    input:{home_price:fmt(price),down_payment:fmt(price*down/100)+' ('+down+'%)',loan_amount:fmt(loan),rate:rate+'%',term:term+' years'},
    monthly:{principal_interest:fmt(pi),property_tax:fmt(taxMo),insurance:fmt(ins),pmi:down<20?fmt(pmi):null,total:fmt(total)},
    totals:{total_interest:fmt(totalInt),total_loan_cost:fmt(pi*n),total_all_in:fmt(total*n)},
    qualification:{required_income_annual:fmt(reqIncome),required_income_monthly:fmt(reqIncome/12),note:'Based on 28% front-end DTI. Most lenders allow up to 36%.'},
    banker_note:note,
    powered_by:'FinanceRateCalc.com — Free tools by a 23-year banker',
    full_calculator:'https://financeratecalc.com/mortgage-calculator.html'
  };

  // Remove null values
  Object.keys(result.monthly).forEach(k=>{if(result.monthly[k]===null)delete result.monthly[k];});

  document.getElementById('json').textContent=JSON.stringify(result,null,2);

  document.getElementById('toolDef').textContent=JSON.stringify({
    name:'frc_mortgage_calculator',
    description:'Calculate monthly payment, total interest, and required income for any US property. Returns structured JSON with monthly breakdown, totals, and a 23-year banker note.',
    parameters:{type:'object',properties:{price:{type:'number',description:'Home listing price in USD'},down:{type:'number',description:'Down payment percentage, default 20'},rate:{type:'number',description:'Annual interest rate percentage'},term:{type:'number',description:'Loan term in years, default 30'}},required:['price','rate']},
    endpoint:'https://financeratecalc.com/api/mortgage.html'
  },null,2);
}

window.addEventListener('load',function(){
  var p=new URLSearchParams(window.location.search);
  if(p.get('price')) document.getElementById('p').value=p.get('price');
  if(p.get('down')) document.getElementById('d').value=p.get('down');
  if(p.get('rate')) document.getElementById('r').value=p.get('rate');
  if(p.get('term')) document.getElementById('t').value=p.get('term');
  calc();
});
</script>
<script src="/banker-widget.js"></script>
</body>
</html>
