name: FRC Overlay Intelligence Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'  # Her Pazartesi 06:00 UTC
  workflow_dispatch:

jobs:
  update-overlay-database:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests pdfplumber anthropic scikit-learn numpy fredapi

    - name: Run PDF Pipeline
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python .github/scripts/pdf_pipeline.py

    - name: Run OFI Macro Model (Two-Stage)
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: python .github/scripts/ofi_macro_model.py

    - name: Commit updates
      run: |
        git config user.name "FRC Intelligence Bot"
        git config user.email "bot@financeratecalc.com"
        git add overlay-intelligence.json ofi-macro-model.json
        git diff --staged --quiet || (git pull --rebase origin main && git commit -m "Weekly overlay + macro model update: $(date +'%Y-%m-%d')" && git push)
