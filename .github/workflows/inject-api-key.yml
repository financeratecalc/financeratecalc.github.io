name: Inject API Key

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Inject Anthropic API Key into Zai pages
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # frc-banker-ai.html
          sed -i "s|window.__ZAI_KEY__ || ''|window.__ZAI_KEY__ || '${ANTHROPIC_KEY}'|g" frc-banker-ai.html
          
          # zai-for-brokers.html
          sed -i "s|window.__ZAI_KEY__ || ''|window.__ZAI_KEY__ || '${ANTHROPIC_KEY}'|g" zai-for-brokers.html
          
          echo "✅ API key injected"

      - name: Commit injected files
        run: |
          git config user.email "pipeline@financeratecalc.com"
          git config user.name "OFI Pipeline"
          git add frc-banker-ai.html zai-for-brokers.html
          git diff --staged --quiet || git commit -m "Auto: Inject API key [skip ci]"
          git push
