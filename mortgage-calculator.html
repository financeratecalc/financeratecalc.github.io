<style>
:root{--ink:#0f0e0c;--paper:#faf8f4;--cream:#f2ede4;--gold:#b8860b;--gold-light:#d4a017;--text:#2c2a26;--muted:#8a8070;--border:#ddd8cc;--white:#ffffff;--green:#2a6b4a;--red:#8b2a2a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Geist',sans-serif;background:var(--paper);color:var(--text);line-height:1.6;}
header{background:var(--ink);padding:0 60px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:900;color:#fff;text-decoration:none;}
.logo em{font-style:italic;color:var(--gold-light);}
.nav-links a{color:rgba(255,255,255,0.5);text-decoration:none;font-size:13px;font-weight:500;margin-left:24px;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold-light);}
@media(max-width:768px){header{padding:0 20px;}.nav-links{display:none;}}

.hero{background:var(--ink);padding:50px 60px 60px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(184,134,11,0.08) 0%,transparent 60%);}
.hero-inner{max-width:900px;margin:0 auto;position:relative;z-index:1;}
.hero-eye{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.hero-eye::before{content:'';display:inline-block;width:24px;height:1px;background:var(--gold-light);}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:10px;}
.hero h1 em{font-style:italic;color:var(--gold-light);}
.hero-sub{color:rgba(255,255,255,0.4);font-size:14px;font-weight:300;}

.main{max-width:960px;margin:0 auto;padding:40px 60px 80px;display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:start;}
@media(max-width:900px){.main{grid-template-columns:1fr;padding:30px 20px 60px;}}

.input-panel{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:28px;position:sticky;top:80px;}
.panel-title{font-family:'Fraunces',serif;font-size:17px;font-weight:900;color:var(--ink);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.field{margin-bottom:18px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
.field input[type="number"], .field select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--paper);outline:none;font-family:'Geist',sans-serif;}
.calc-btn{width:100%;background:var(--gold);color:var(--ink);border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.calc-btn:hover{background:var(--gold-light);transform:translateY(-1px);}

.results-panel{min-height:200px;}
.result-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;}
@media(max-width:500px){.result-cards{grid-template-columns:1fr;}}
.rcard{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.rcard.primary{background:var(--ink);border-color:transparent;grid-column:1/-1;}
.rcard-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.rcard-value{font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:var(--ink);line-height:1;}
.rcard.primary .rcard-value{color:var(--gold-light);font-size:38px;}

/* ZIYA'S SMART ADVISOR CSS */
#smart-alert-container {
    background: #ffffff;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 10px 15px -3px rgba(184, 134, 11, 0.1);
}
.smart-tag {
    background: var(--gold);
    color: var(--ink);
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 50px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 10px;
}
.smart-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--ink);
    margin-bottom: 8px;
}
.smart-desc {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 15px;
    line-height: 1.5;
}
.smart-link-btn {
    display: block;
    text-align: center;
    background: var(--ink);
    color: var(--gold-light) !important;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none !important;
    font-weight: 700;
}

.banker-note{background:var(--cream);border-left:3px solid var(--gold);border-radius:12px;padding:20px;margin-bottom:24px;display:flex;gap:14px;}
footer{background:var(--ink);padding:32px 60px; color: white; text-align: center;}
</style>
</head>
